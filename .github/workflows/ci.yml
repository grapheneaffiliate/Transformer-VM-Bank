name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Strictness lives on the dedicated jobs below — not on global RUSTFLAGS.
  # The legacy crate (frozen per ADR-0001) has intentional self-deprecation
  # warnings; making them errors would block the build.

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --release
      - name: Run all tests
        run: cargo test --workspace --release
      - name: Legacy isolation guard
        run: bash tools/ci/check_legacy_isolation.sh

  fmt-and-clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # Clippy is advisory: it runs to surface issues but does NOT fail
      # the build. Many warnings live in the frozen legacy crate
      # (per ADR-0001 we don't modify that code) and in pre-existing
      # crates whose style cleanup is tracked separately. New crates
      # (`crypto_agility/`) get a stricter pass below.
      - name: cargo clippy (advisory)
        run: cargo clippy --workspace --all-targets || true
      - name: cargo clippy strict (new crates only)
        run: cargo clippy -p psl-crypto-agility --all-targets -- -D warnings

  # Formal-verification gate. Builds the Lean 4 proofs against mathlib and runs
  # the in-build axiom-footprint audit (`lean/PSL/Audit.lean`). This is the gate
  # that was previously MISSING: the proofs existed but nothing checked them on
  # PRs, so a `sorry`, a `native_decide`, an unexpected axiom, or a deleted
  # theorem could land unnoticed. The audit module fails `lake build` on any of
  # those, so this job is the continuous enforcement of the trust boundary
  # documented in VERIFICATION.md.
  formal-verification:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Lean ↔ implementation drift check
        # Fails if any implementation source the Lean models hand-translate
        # (primitives/*.c, sequencer/src/trace.rs, crypto/src/{account,smt}.rs)
        # changed without the pinned manifest being re-reviewed. Guards the
        # hand-translation contract documented in VERIFICATION.md.
        run: python3 tools/check_lean_drift.py
      - name: Install elan (Lean toolchain manager)
        run: |
          curl -fsSL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -o elan-init.sh
          sh elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache Lean toolchain + resolved packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            lean/.lake/packages
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain', 'lean/lake-manifest.json') }}
      - name: Fetch prebuilt mathlib cache
        working-directory: lean
        run: lake exe cache get
      - name: Build proofs + run formal-audit gate
        working-directory: lean
        # `lake build` compiles every PSL theorem AND elaborates PSL/Audit.lean,
        # whose `run_cmd` aborts the build if any load-bearing theorem gains a
        # disallowed axiom (sorryAx / Lean.ofReduceBool / unlisted axiom).
        run: lake build

  reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Verify REPRODUCE.md commands still work
        run: |
          # Re-runs the headline reproduction commands from a clean clone.
          # Anything in REPRODUCE.md that becomes stale fails this job.
          cargo build --workspace --release
          cargo test --workspace --release
          cargo run -p psl-agent-sdk --release --example trader_agent
          cargo run -p psl-agent-sdk --release --example service_agent

  # Cross-platform determinism per ADR-0011 test #8.
  #
  # Runs the full workspace test suite + the cross_platform_determinism
  # integration test on BOTH x86_64 and aarch64 GitHub-hosted runners.
  # The cross_platform_determinism test pins BLAKE3-256 of the HKDF salt
  # and each ContextString — these values must match byte-for-byte
  # across architectures or the AEAD-key derivation diverges.
  #
  # Per the engineer-reviewer's PR #14 confirmation: uses GitHub-
  # hosted ubuntu-24.04 + ubuntu-24.04-arm runners (NOT self-hosted).
  # GitHub's runner trust surface is well-trodden and small;
  # self-hosted would add an audit surface that the v0.1.0 posture
  # doesn't justify.
  cross-platform-determinism:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-24.04,     arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner.os }}
    name: cross-platform-determinism (${{ matrix.runner.arch }})
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Cross-platform determinism test (${{ matrix.runner.arch }})
        run: |
          # The cross_platform_determinism integration test asserts
          # BLAKE3-256 of the HKDF salt + each ContextString matches
          # pinned golden values. If the ${{ matrix.runner.arch }}
          # run produces a different digest from the x86_64 baseline,
          # the test fails and CI surfaces the divergence.
          cargo test -p psl-crypto-agility --release --test cross_platform_determinism
      - name: Full crypto_agility tests (${{ matrix.runner.arch }})
        run: |
          # Belt-and-suspenders: also runs the full crypto_agility
          # test suite (round-trips, hybrid signatures, witness
          # encryption tests #1-7). If any of these are non-
          # deterministic across architectures, this job catches it.
          cargo test -p psl-crypto-agility --release
