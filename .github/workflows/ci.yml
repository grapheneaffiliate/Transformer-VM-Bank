name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Strictness lives on the dedicated jobs below — not on global RUSTFLAGS.
  # The legacy crate (frozen per ADR-0001) has intentional self-deprecation
  # warnings; making them errors would block the build.

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --release
      - name: Run all tests
        run: cargo test --workspace --release
      - name: Legacy isolation guard
        run: bash tools/ci/check_legacy_isolation.sh

  fmt-and-clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # Clippy is strict on every active crate. The frozen legacy
      # crate (ADR-0001: `legacy/rust_runner` is not modified, and it
      # carries intentional self-deprecation warnings) is excluded
      # from the strict gate but still gets an advisory pass so its
      # warnings stay visible in logs.
      - name: cargo clippy (strict, active crates)
        run: cargo clippy --workspace --exclude psl-rust-runner --all-targets -- -D warnings
      - name: cargo clippy (advisory, frozen legacy crate)
        run: cargo clippy -p psl-rust-runner --all-targets || true

  python-lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: ruff check
        # Lints tools/, tests/, and sdk-examples/python/.
        # Config (per-file ignores) lives in pyproject.toml.
        uses: astral-sh/ruff-action@v3

  # Internal-link integrity for every Markdown file. --offline checks
  # only repo-local file links (deterministic, no network flakiness);
  # external URLs are deliberately out of scope here.
  docs-links:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: lychee (offline, internal links only)
        uses: lycheeverse/lychee-action@v2
        with:
          # --hidden so .github/*.md templates are scanned too.
          args: --offline --no-progress --hidden "**/*.md"
          fail: true

  reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Verify REPRODUCE.md commands still work
        run: |
          # Re-runs the headline reproduction commands from a clean clone.
          # Anything in REPRODUCE.md that becomes stale fails this job.
          cargo build --workspace --release
          cargo test --workspace --release
          cargo run -p psl-agent-sdk --release --example trader_agent
          cargo run -p psl-agent-sdk --release --example service_agent

  # Cross-platform determinism per ADR-0011 test #8.
  #
  # Runs the full workspace test suite + the cross_platform_determinism
  # integration test on BOTH x86_64 and aarch64 GitHub-hosted runners.
  # The cross_platform_determinism test pins BLAKE3-256 of the HKDF salt
  # and each ContextString — these values must match byte-for-byte
  # across architectures or the AEAD-key derivation diverges.
  #
  # Per the engineer-reviewer's PR #14 confirmation: uses GitHub-
  # hosted ubuntu-24.04 + ubuntu-24.04-arm runners (NOT self-hosted).
  # GitHub's runner trust surface is well-trodden and small;
  # self-hosted would add an audit surface that the v0.1.0 posture
  # doesn't justify.
  cross-platform-determinism:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - { os: ubuntu-24.04,     arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner.os }}
    name: cross-platform-determinism (${{ matrix.runner.arch }})
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Cross-platform determinism test (${{ matrix.runner.arch }})
        run: |
          # The cross_platform_determinism integration test asserts
          # BLAKE3-256 of the HKDF salt + each ContextString matches
          # pinned golden values. If the ${{ matrix.runner.arch }}
          # run produces a different digest from the x86_64 baseline,
          # the test fails and CI surfaces the divergence.
          cargo test -p psl-crypto-agility --release --test cross_platform_determinism
      - name: Full crypto_agility tests (${{ matrix.runner.arch }})
        run: |
          # Belt-and-suspenders: also runs the full crypto_agility
          # test suite (round-trips, hybrid signatures, witness
          # encryption tests #1-7). If any of these are non-
          # deterministic across architectures, this job catches it.
          cargo test -p psl-crypto-agility --release
