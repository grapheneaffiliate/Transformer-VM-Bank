name: ci
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Strictness lives on the dedicated jobs below — not on global RUSTFLAGS.
  # The legacy crate (frozen per ADR-0001) has intentional self-deprecation
  # warnings; making them errors would block the build.

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --release
      - name: Run all tests
        run: cargo test --workspace --release
      - name: Legacy isolation guard
        run: bash tools/ci/check_legacy_isolation.sh

  fmt-and-clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      # Clippy is advisory: it runs to surface issues but does NOT fail
      # the build. Many warnings live in the frozen legacy crate
      # (per ADR-0001 we don't modify that code) and in pre-existing
      # crates whose style cleanup is tracked separately. New crates
      # (`crypto_agility/`) get a stricter pass below.
      - name: cargo clippy (advisory)
        run: cargo clippy --workspace --all-targets || true
      - name: cargo clippy strict (new crates only)
        run: cargo clippy -p psl-crypto-agility --all-targets -- -D warnings

  reproducibility:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      - name: Verify REPRODUCE.md commands still work
        run: |
          # Re-runs the headline reproduction commands from a clean clone.
          # Anything in REPRODUCE.md that becomes stale fails this job.
          cargo build --workspace --release
          cargo test --workspace --release
          cargo run -p psl-agent-sdk --release --example trader_agent
          cargo run -p psl-agent-sdk --release --example service_agent
