name: security
on:
  schedule:
    - cron: '17 6 * * *'   # daily, off-peak
  pull_request:
    paths:
      - 'Cargo.lock'
      - 'Cargo.toml'
      - '**/Cargo.toml'
  workflow_dispatch:

jobs:
  cargo-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        # The --ignore list mirrors deny.toml's [advisories].ignore.
        # Both tools must agree; cargo-audit doesn't read deny.toml.
        # Each ignore has a documented rationale in /deny.toml.
        # Update both files together if the list changes.
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436

  cargo-deny:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check licenses bans advisories sources

  sbom:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
      - name: Generate SBOM
        run: tools/sbom.sh > sbom.txt
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.txt
