server:
  http_listen_port: 9080

clients:
  - url: http://loki:3100/loki/api/v1/push

positions:
  filename: /tmp/positions.yaml

scrape_configs:
  - job_name: psl-systemd
    journal:
      max_age: 12h
      labels: { job: psl-systemd }
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        regex: 'psl-(sequencer|follower|light-client).service'
        action: keep
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
