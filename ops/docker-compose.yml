# PSL observability stack — local + reference for production deploys.
#
# Brings up: Prometheus, Grafana, Alertmanager, Loki + Promtail, Tempo.
# Provisioned dashboards live in ops/dashboards/, alert rules in
# ops/alerts/, datasource and Alertmanager config in ops/configs/.
#
#   docker compose -f ops/docker-compose.yml up -d
#
# Then: open http://localhost:3000 (Grafana, admin/admin).

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: psl-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/alerts:ro
      - prom_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: psl-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alert_data:/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: psl-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on: [prometheus, loki, tempo]
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    container_name: psl-loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    container_name: psl-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log/psl:/var/log/psl:ro
    depends_on: [loki]
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.0
    container_name: psl-tempo
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    restart: unless-stopped

volumes:
  prom_data:
  alert_data:
  grafana_data:
  loki_data:
  tempo_data:
