global:
  resolve_timeout: 5m
  # Replace with operator's SMTP / PagerDuty / Slack at deploy time.

route:
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'oncall-default'
  routes:
    # Critical-severity alerts page immediately, no batching.
    - matchers: [severity="critical"]
      receiver: 'oncall-page'
      group_wait: 0s
      repeat_interval: 30m
    # High-severity alerts page within 5 min.
    - matchers: [severity="high"]
      receiver: 'oncall-page'
      repeat_interval: 1h
    # Warning-severity alerts go to chat only.
    - matchers: [severity="warning"]
      receiver: 'oncall-chat'

receivers:
  - name: 'oncall-default'
    # Email fallback so nothing silently drops.
    email_configs:
      - to: 'oncall@example.invalid'
        send_resolved: true

  - name: 'oncall-page'
    # Replace with PagerDuty integration key.
    pagerduty_configs:
      - service_key: 'REPLACE_PAGERDUTY_KEY'
        severity: '{{ .CommonLabels.severity }}'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'oncall-chat'
    # Replace with Slack webhook.
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE'
        channel: '#psl-alerts'
        send_resolved: true
        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

inhibit_rules:
  # If the chain has halted, don't also page for downstream symptoms.
  - source_matchers: [alertname="PSLSequencerHalt"]
    target_matchers: [severity=~"high|warning"]
    equal: [cluster]
